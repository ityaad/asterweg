<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asterweg - Under Construction</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #ffffff;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #1a1a1a;
        }

        .container {
            text-align: center;
            z-index: 1;
            max-width: 500px;
            padding: 80px 40px;
            background: transparent;
            border: none;
            box-shadow: none;
        }

        .logo {
            display: none;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 700;
            color: #1a1a1a;
            margin-bottom: 8px;
            background: none;
            -webkit-background-clip: unset;
            -webkit-text-fill-color: unset;
            background-clip: unset;
        }

        .subtitle {
            font-size: 1rem;
            font-weight: 400;
            color: #666666;
            margin-bottom: 60px;
            letter-spacing: 0.5px;
        }

        .construction-icon {
            display: none;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message {
            font-size: 0.95rem;
            font-weight: 400;
            color: #555555;
            margin-bottom: 60px;
            line-height: 1.8;
        }

        .cta-section {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 40px;
        }

        .btn {
            padding: 12px 32px;
            font-size: 0.9rem;
            font-weight: 500;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.2s ease;
            text-decoration: none;
            display: inline-block;
            letter-spacing: 0;
        }

        .btn-primary {
            background: #000000;
            color: #ffffff;
        }

        .btn-primary:hover {
            background: #333333;
        }

        .btn-secondary {
            background: transparent;
            color: #1a1a1a;
            border: 1px solid #1a1a1a;
        }

        .btn-secondary:hover {
            background: #f5f5f5;
        }

        .social-links {
            margin-top: 80px;
            padding-top: 40px;
            border-top: 1px solid #e0e0e0;
        }

        .social-links p {
            color: #999999;
            margin-bottom: 20px;
            font-size: 0.85rem;
            font-weight: 400;
            text-transform: uppercase;
            letter-spacing: 0.8px;
        }

        .social-icons {
            display: flex;
            gap: 20px;
            justify-content: center;
        }

        .social-icon {
            width: 40px;
            height: 40px;
            border-radius: 4px;
            background: transparent;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #1a1a1a;
            text-decoration: none;
            font-size: 1.2rem;
            transition: all 0.2s ease;
            border: 1px solid #e0e0e0;
            font-weight: 600;
        }

        .social-icon:hover {
            background: #f5f5f5;
            border-color: #1a1a1a;
        }

        .progress-bar {
            margin-top: 60px;
            background: #f0f0f0;
            height: 3px;
            border-radius: 2px;
            overflow: hidden;
            max-width: 300px;
            margin-left: auto;
            margin-right: auto;
            border: none;
        }

        .progress-fill {
            height: 100%;
            background: #1a1a1a;
            animation: loading 2.5s ease-in-out infinite;
        }

        @keyframes loading {
            0% { width: 0%; }
            50% { width: 100%; }
            100% { width: 100%; }
        }

        @media (max-width: 768px) {
            .container {
                padding: 60px 30px;
            }

            h1 {
                font-size: 2rem;
            }

            .subtitle {
                font-size: 0.95rem;
                margin-bottom: 40px;
            }

            .message {
                font-size: 0.9rem;
                margin-bottom: 40px;
            }

            .btn {
                padding: 10px 24px;
                font-size: 0.85rem;
            }

            .social-icons {
                gap: 12px;
            }

            .social-icon {
                width: 36px;
                height: 36px;
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>www.asterweg.com</h1>
        <p class="subtitle">Under Construction</p>

        <p class="message">
            We're working hard to bring something amazing to you. 
            <br><br>
            Check back soon for updates!
        </p>

        <div class="progress-bar">
            <div class="progress-fill"></div>
        </div>

        <div class="cta-section">
            <a href="#" class="btn btn-secondary">Learn More</a>
        </div>

        <div class="social-links">
            <p>Follow us</p>
            <div class="social-icons">
                <a href="https://twitter.com" class="social-icon" title="Twitter" target="_blank">𝕏</a>
                <a href="https://github.com" class="social-icon" title="GitHub" target="_blank">⚙</a>
                <a href="https://linkedin.com" class="social-icon" title="LinkedIn" target="_blank">in</a>
            </div>
        </div>
    </div>
</body>
</html>
